apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-demo-page
  namespace: tb-argocd-demo
  labels:
    app.kubernetes.io/name: argocd-demo
data:
  index.html: |
    <!doctype html>
    <html>
      <head>
        <title>Argo CD Demo</title>
      </head>
      <body>
        <h1>Argo CD GitHub Demo</h1>
        <p>This page was deployed from a GitHub repository.</p>
        <p>Version: v1</p>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-demo
  namespace: tb-argocd-demo
  labels:
    app.kubernetes.io/name: argocd-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: page
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: page
          configMap:
            name: argocd-demo-page
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-demo
  namespace: tb-argocd-demo
  labels:
    app.kubernetes.io/name: argocd-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: argocd-demo
  ports:
    - name: http
      port: 80
      targetPort: http
